name: iOS Build

on:
  push:
    branches: [main, master, develop, codex/ios-no-auth-functional-test, codex/ios-miniprogram-parity]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release (no signing)
        run: |
          xcodebuild -scheme ClassTrace \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/ClassTrace.app Payload/
          zip -r ClassTrace.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassTrace-IPA
          path: ClassTrace.ipa

  test:
    name: Run Unit Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run Tests
        run: |
          xcodebuild test -scheme ClassTrace \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO

  verify:
    name: Verify Architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Architecture Checks
        run: node tools/verify-ios-architecture.mjs
