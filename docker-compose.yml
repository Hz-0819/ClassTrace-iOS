services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: classtrace
      POSTGRES_PASSWORD: classtrace
      POSTGRES_DB: classtrace
    ports:
      - "5432:5432"
    volumes:
      - classtrace_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classtrace"]
      interval: 5s
      timeout: 3s
      retries: 20
  api:
    build: ./services/api
    env_file: ./services/api/.env
    environment:
      DATABASE_URL: postgresql://classtrace:classtrace@postgres:5432/classtrace?schema=public
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  classtrace_postgres:
